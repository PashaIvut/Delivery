syntax = "proto3";

package order_service;

service OrderService {
    rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
    rpc GetOrderById(GetOrderByIdRequest) returns (GetOrderByIdResponse);
    rpc GetOrdersByUser(GetOrdersByUserRequest) returns (GetOrdersByUserResponse);
    rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (UpdateOrderStatusResponse);
}

message CreateOrderRequest {
    string userId = 1;
    repeated OrderItemMessage items = 2;
    string address = 3;
}

message CreateOrderResponse {
    OrderMessage order = 1;
}

message GetOrderByIdRequest {
    string orderId = 1;
}

message GetOrderByIdResponse {
    OrderMessage order = 1;
}

message GetOrdersByUserRequest {
    string userId = 1;
}

message GetOrdersByUserResponse {
    repeated OrderMessage orders = 1;
}

message UpdateOrderStatusRequest {
    string orderId = 1;
    OrderStatus status = 2;
}

message UpdateOrderStatusResponse {
     OrderMessage order = 1;
}

message OrderMessage {
    string id = 1;
    string userId = 2;
    repeated OrderItemMessage items = 3;
    OrderStatus status = 4;
    double totalPrice = 5;
    string address = 6;
    string createdAt = 7;
    string updatedAt = 8;
}

message OrderItemMessage {
    string productId = 1;
    string name = 2;
    int32 quantity = 3;
    double price = 4;
}

enum OrderStatus {
    UNSPECIFIED = 0;
    CREATED = 1;
    CONFIRMED = 2;
    PREPARING = 3;
    DELIVERING = 4;
    COMPLETED = 5;
    CANCELLED = 6;
}